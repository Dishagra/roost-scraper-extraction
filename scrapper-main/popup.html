<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Roost Collector</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="wrap">
    <h1>Roost Collector</h1>
    <p id="status">Loading...</p>

    <div class="grid">
      <button id="startBtn">Start</button>
      <button id="pauseBtn">Pause &amp; Export CSV</button>
      <button id="exportCsvBtn">Export CSV Now</button>
      <button id="exportJsonBtn">Export JSON (backup)</button>
      <button id="clearBtn" class="danger">Clear All</button>
    </div>

    <div class="stats">
      <div><b>Posts captured:</b> <span id="postCount">0</span></div>
      <div><b>Mode:</b> <span id="mode">-</span></div>
    </div>

    <p class="hint">
      Start → scroll the group feed → Pause. CSV lands in Downloads,
      double-click to open in Excel.
    </p>
  </div>
  <script src="popup.js"></script>
</body>
</html>
